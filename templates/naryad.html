<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>&#1053;&#1072;&#1088;&#1103;&#1076;</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 28px;
      color: #111;
      font-family: Arial, sans-serif;
      background: #fff;
    }

    .document {
      min-height: 100vh;
      padding: 18px 22px 28px;
      border: 2px solid #1f1f1f;
    }

    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      min-height: 86px;
      padding-bottom: 12px;
      border-bottom: 2px solid #1f1f1f;
    }

    .left-logo {
      width: 155px;
      height: auto;
      object-fit: contain;
    }

    .right-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    .title {
      margin: 18px 0 12px;
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .field {
      min-height: 28px;
      padding: 6px 8px;
      border: 1px solid #333;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      padding: 7px 6px;
      border: 1px solid #333;
      font-size: 12px;
      vertical-align: top;
      word-break: break-word;
    }

    th {
      background: #ededed;
      font-weight: 700;
      text-align: center;
    }

    .signatures {
      display: flex;
      justify-content: space-between;
      gap: 28px;
      margin-top: 36px;
      font-size: 14px;
    }

    .signature-line {
      flex: 1;
      padding-top: 20px;
      border-top: 1px solid #333;
      text-align: center;
    }

    @page {
      size: A4;
      margin: 12mm;
    }
  </style>
</head>
<body>
  <main class="document">
    <header class="header">
      <img src="./assets/leftlogo.png" alt="" class="left-logo">
      <img src="./assets/rightlogo.png" alt="" class="right-logo">
    </header>

    <h1 class="title">&#1053;&#1040;&#1056;&#1071;&#1044;</h1>

    <section class="meta">
      <div class="field"><strong>&#1044;&#1072;&#1090;&#1072;:</strong> {{date}}</div>
      <div class="field"><strong>&#1057;&#1084;&#1103;&#1085;&#1072;:</strong> {{shift}}</div>
      <div class="field"><strong>&#1048;&#1079;&#1075;&#1086;&#1090;&#1074;&#1080;&#1083;:</strong> {{created_by}}</div>
    </section>

    <table>
      <thead>
        <tr>
          <th style="width: 6%;">&#8470;</th>
          <th style="width: 18%;">&#1045;&#1082;&#1080;&#1087;</th>
          <th style="width: 18%;">&#1040;&#1074;&#1090;&#1086;&#1084;&#1086;&#1073;&#1080;&#1083;</th>
          <th style="width: 22%;">&#1042;&#1086;&#1076;&#1072;&#1095;</th>
          <th style="width: 36%;">&#1047;&#1072;&#1076;&#1072;&#1095;&#1072; / &#1084;&#1072;&#1088;&#1096;&#1088;&#1091;&#1090;</th>
        </tr>
      </thead>
      <tbody>
        {{rows}}
      </tbody>
    </table>

    <section class="signatures">
      <div class="signature-line">&#1048;&#1079;&#1075;&#1086;&#1090;&#1074;&#1080;&#1083;</div>
      <div class="signature-line">&#1055;&#1088;&#1086;&#1074;&#1077;&#1088;&#1080;&#1083;</div>
    </section>
  </main>
</body>
</html>
